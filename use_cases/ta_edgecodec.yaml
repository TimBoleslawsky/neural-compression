version: "task_aware_edgecodec_smart_home_v2"
base_path: "/path/to/repo"

seed: 42

mode: train

# Dataset configuration
dataset:
  name: "timeseries_text"
  arguments:
    file_path: "/path/to/.csv"

    split_ratios: [0.81, 0.09, 0.10]

    max_rows: null

    signal_columns:
      - "lights"
      - "Press_mm_hg"
      - "T_out"
      - "RH_out"
      - "Windspeed"
      - "Visibility"
      - "Tdewpoint"

    encode_signals:
      - "lights"
      - "Press_mm_hg"
      - "T_out"
      - "RH_out"
      - "Windspeed"
      - "Visibility"
      - "Tdewpoint"

    decode_signals:
      - "lights"
      - "Press_mm_hg"
      - "T_out"
      - "RH_out"
      - "Windspeed"
      - "Visibility"
      - "Tdewpoint"

    window_size: 144
    stride: 1

    compute_stats: true
    apply_normalization: "standardize"
    normalize_encode_only: false

    delimiter: ","
    na_values: []
    datetime_format: "single_column"
    datetime_column: "date"

dataloader:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  train_shuffle: true
  single_batch_eval: false

model:
  name: "edgecodec"
  arguments:
    use_discriminator: false

    encoder:
      type: "edgecodec_encoder"
      arguments:
        in_channels: 7
        C: 7
        D: 7
        channel_progression: [7, 7, 7, 7]

    quantizer:
      type: "rvq"
      arguments:
        num_quantizers: 2
        codebook_size: 768
        embedding_dim: 72
        epsilon: 1.0e-5

    decoder:
      type: "edgecodec_decoder"
      arguments:
        C: 7
        D: 7
        channel_progression: [7, 7, 7, 7]

training_module:
  name: "task_aware_edgecodec"
  parameters:
    # Standard EdgeCodec parameters
    alpha: 0.5
    eta: 0.25
    target_key: "encode"
    beta: 0.01
    task_hidden_dim: 128            

optimizer:
  name: "adam"
  parameters:
    lr: 0.0005
    betas:
      - 0.9
      - 0.98
    eps: 1.0e-8

scheduler:
  function:
    name: "cosine_annealing"
    parameters:
      T_max: 500
      eta_min: 1.0e-6
  trainer_parameters:
    interval: "epoch"
    frequency: 1

callbacks:
  modelcheckpoint:
    dirpath: "${base_path}/checkpoints/${version}"
    monitor: "val_loss"
    mode: "min"
    save_top_k: 3
    save_last: true
    verbose: true
    filename: "${version}-{epoch:02d}-{val_loss:.4f}"

  earlystopping:
    monitor: "val_loss"
    patience: 10
    mode: "min"
    min_delta: 0.001
    verbose: true

  learningratemonitor: {}

trainer:
  max_epochs: 80
  num_sanity_val_steps: 2
  val_check_interval: 1.0
  limit_val_batches: 1.0
  limit_train_batches: 1.0

  log_every_n_steps: 10
  enable_progress_bar: true

  deterministic: true

  gradient_clip_val: 0.5
  gradient_clip_algorithm: "norm"

  precision: "32-true"

runner:
  name: "base"
  parameters: {}

checkpoints:
  model: null
  trainer: null
